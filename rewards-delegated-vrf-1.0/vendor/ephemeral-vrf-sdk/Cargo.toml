[package]
name = "ephemeral-vrf-sdk"
description = "Ephemeral Vrf Integration SDK"
version = "0.1.2"
authors = ["MagicBlock Labs <dev@magicblock.xyz>"]
repository = "https://github.com/magicblock-labs/ephemeral-vrf"
documentation = "https://docs.magicblock.xyz/"
homepage = "https://www.magicblock.xyz/"
keywords = ["solana", "vrf", "ephemeral-rollups", "magicblock"]
readme = "README.md"
edition = "2021"
license = "MIT"

[features]
default = []
anchor = ["anchor-lang"]

[dependencies]
anchor-lang = { version = "1.0.0", optional = true }
solana-program = "3.0.0"
ephemeral-vrf-sdk-vrf-macro = { path = "vrf-macro", version = "0.1.2" }
borsh = "1.5.7"
