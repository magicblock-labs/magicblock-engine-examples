[package]
name = "rewards-delegated-vrf"
version = "0.1.0"
description = "MagicBlock Rewards Program"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]
anchor-debug = []
custom-heap = []
custom-panic = []

[dependencies]
anchor-lang = { version = "0.32.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.32.1", features = ["idl-build"] }
ephemeral-rollups-sdk = { version = "0.8.6", features = ["anchor", "disable-realloc"] }
ephemeral-vrf-sdk = {version = "0.2.3", features = ["anchor"]}
spl-associated-token-account = { version = "7", features = ["no-entrypoint"] }

