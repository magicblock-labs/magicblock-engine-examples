[package]
name = "oracle-priced-purchase"
version = "0.1.0"
description = "Simple purchase example using MagicBlock real-time price feeds"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "oracle_priced_purchase"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]
custom-heap = []
custom-panic = []
anchor-debug = []

[dependencies]
anchor-lang = { version = "1.0.2", features = ["init-if-needed"] }
ephemeral-rollups-sdk = { version = "0.14.3", features = ["anchor"] }
pyth-solana-receiver-sdk = "2.0.0"
